# Deploy sawaweb to AWS EC2
# Requires: EC2 host, SSH key in secrets, and optional PM2/Node on instance
name: Deploy to EC2

on:
  push:
    branches: ["main", "master", "Ryan"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:4001' }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_PATH="${{ secrets.EC2_APP_PATH || '/home/ubuntu/sawaweb' }}"
            cd $APP_PATH
            git pull origin ${{ github.ref_name }}
            cd frontend && npm ci && npm run build
            cd $APP_PATH/backend && npm ci && npm run build
            cd $APP_PATH
            pm2 restart sawaweb-frontend 2>/dev/null || (cd frontend && pm2 start npm --name sawaweb-frontend -- start)
            pm2 restart sawaweb-backend 2>/dev/null || (cd backend && pm2 start dist/index.js --name sawaweb-backend)
            pm2 save
